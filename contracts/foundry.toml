[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.34"
via_ir = true
optimizer = true
optimizer_runs = 1

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
]

# Profile for core contracts — higher optimizer runs for cheaper runtime gas.
# Usage: FOUNDRY_PROFILE=optimized forge build
[profile.optimized]
optimizer_runs = 200

[fmt]
ignore = ["src/interfaces/Constants.sol"]
